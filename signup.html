<!DOCTYPE html>
<html>
<head>
    <title>DietDash AI - Signup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4fdf4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup_container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2d6a45; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 95%; padding: 12px; background-color: #40916c; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background-color: #2d6a4f; }
    </style>
</head>
<body>
    <div class="signup_container">
        <h2>DietDash AI</h2>
        <p>Create Your Healthy Account</p>
        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Start My Journey</button>
            <p>Already have an account? <a href="login.html">login</a></p>
        </form>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');

        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            console.log("Form Submit Ho Raha Hai...");

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("✅ " + data.message);
                   window.location.href = '/dashboard';
                    // Form khali kar dena
                } else {
                    alert("⚠️ " + data.message);
                }
            } catch (err) {
                alert("❌ Server connect nahi ho paya!");
            }
        };
    </script>
</body>
</html>
