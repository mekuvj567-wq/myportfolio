<html>
<head>
    <title>DietDash AI - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4fdf4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login_container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2d6a45; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 95%; padding: 12px; background-color: #40916c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2d6a4f; }
        a { color: #40916c; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login_container">
        <h2>Welcome Back! 🥗</h2>
        <p>Login to your DietDash account</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="button" id="loginBtn">Login</button>
             <p>don't have account? <a href="signup.html">signup</a></p>
        </form>
    </div>
    <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if(!email || !password) {
            alert("Please fill all fields!");
            return;
        }

        console.log("Attempting login for:", email);

        try {
            // Hum direct '/login' use karenge kyunki server humara localhost:3000 par hi hai
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            console.log("Response Status:", response.status);
            
            const data = await response.json();
            
            if (data.message === "Success") {
                localStorage.setItem('userName', data.userName);
                alert("Login Success! Ja rahe hain Dashboard par...");
                window.location.href = "/dashboard"; 
            } else {
                alert("Login Fail: " + (data.message || "Invalid Credentials"));
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            alert("Server se connect nahi ho paya! Kya server.js chal raha hai?");
        }
    });
    </script>
</body>
</html>
